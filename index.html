<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>재영과 유나의 결투</title>
<style>

@font-face {
    font-family: 'KerisKedyuche';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_R.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
}
@font-face {
    font-family: 'KerisKedyuche';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-3@1.0/KERISKEDU_B.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}

  :root{
    --bg1:#fff5f8;
    --bg2:#ffe8ef;
    --card:#fffafb;
    --line:#f3bfd0;
    --line-strong:#eaa6bd;
    --text:#5e4350;
    --muted:#9a7483;
    --accent:#f6b6c8;
    --accent-2:#ee9fba;
    --accent-3:#ffd7e3;
    --shadow:0 18px 40px rgba(225, 151, 178, 0.18);
  }
  * { box-sizing: border-box; }
  body{
    margin:0;
    font-family: 'KerisKedyuche', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color:var(--text);
    background: radial-gradient(circle at top, #fffdfd 0%, var(--bg1) 36%, var(--bg2) 100%);
    min-height:100vh;
    overflow-x:hidden;
  }
  .bg-hearts{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
  }
  .float-heart{
    position:absolute; font-size:16px; opacity:.14; animation: drift linear infinite; filter: blur(.1px);
  }
  @keyframes drift{
    0%{ transform:translateY(110vh) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:.14; }
    100%{ transform:translateY(-15vh) translateX(18px) rotate(18deg); opacity:0; }
  }
  .wrap{
    position:relative; z-index:1; max-width:760px; margin:36px auto; padding:20px;
  }
  .card{
    background:rgba(255,250,251,0.92);
    border:1px solid rgba(238,159,186,.35);
    backdrop-filter: blur(10px);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:26px 22px 22px;
  }
  .header{
    margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid rgba(234,166,189,.45);
  }
  h1{
    margin:0 0 8px; font-size:clamp(28px, 4vw, 42px); line-height:1.06; letter-spacing:-0.02em; color:#7a5364;
  }
  .subtitle{
    margin:0; color:var(--muted); font-size:15px; line-height:1.5;
  }
  .topbar{
    display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:14px; flex-wrap:wrap;
  }
  .counter{
    background:linear-gradient(180deg, #fff, #fff4f7);
    border:1px solid rgba(234,166,189,.42);
    color:#8d6071;
    border-radius:999px;
    padding:8px 12px;
    font-size:14px;
    box-shadow:0 4px 12px rgba(234,166,189,.12);
  }
  .actions{
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .btn{
    border:none;
    border-radius:999px;
    padding:10px 14px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    color:#7b5363;
    background:linear-gradient(180deg, #fff, #ffe8ef);
    border:1px solid rgba(234,166,189,.42);
    box-shadow:0 6px 16px rgba(234,166,189,.14);
    transition:transform .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 10px 20px rgba(234,166,189,.18); }
  .btn:active{ transform:translateY(0); }
  .btn.primary{
    background:linear-gradient(180deg, #ffdce8, #f7bdd0);
  }
  .copy-status{
    width:100%;
    font-size:13px;
    color:#af788c;
    min-height:18px;
  }
  .milestone-badge{
    display:none;
    position:fixed;
    left:50%;
    top:22px;
    transform:translateX(-50%) translateY(-10px) scale(.96);
    background:linear-gradient(180deg, #fff5f8, #ffdbe7);
    color:#8f5c6f;
    border:1px solid rgba(234,166,189,.5);
    border-radius:999px;
    padding:12px 18px;
    box-shadow:0 16px 30px rgba(234,166,189,.24);
    z-index:20;
    font-weight:800;
    opacity:0;
  }
  .milestone-badge.show{
    display:block;
    animation: toastInOut 1.8s ease forwards;
  }
  @keyframes toastInOut{
    0%{ opacity:0; transform:translateX(-50%) translateY(-10px) scale(.96); }
    15%{ opacity:1; transform:translateX(-50%) translateY(0) scale(1.02); }
    75%{ opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
    100%{ opacity:0; transform:translateX(-50%) translateY(-8px) scale(.98); }
  }
  .list{ list-style:none; margin:0; padding:0; }
  .row{
    position:relative; display:flex; align-items:center; gap:12px; padding:12px 4px; border-radius:16px;
    transition:transform .18s ease, background-color .18s ease, box-shadow .18s ease;
  }
  .row:hover{ background:rgba(255, 220, 231, 0.28); }
  .row.checked{
    background:rgba(255, 221, 231, .45);
    transform:scale(1.005);
    box-shadow:0 8px 18px rgba(238,159,186,.12);
  }
  .divider{
    margin:10px 0 6px; border:none; height:1px; background:linear-gradient(90deg, transparent, var(--line-strong), transparent); opacity:.9;
  }
  .num{
    width:34px; flex:0 0 34px; text-align:right; color:#a07183; font-weight:700; font-variant-numeric: tabular-nums;
  }
  .check-wrap{ position:relative; width:28px; height:28px; flex:0 0 28px; }
  .check{
    appearance:none; -webkit-appearance:none; width:28px; height:28px; margin:0; border-radius:10px;
    border:1.8px solid var(--line-strong); background:linear-gradient(180deg, #fff, #fff2f6);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 4px 10px rgba(234,166,189,.12);
    cursor:pointer; position:relative; transition:all .18s ease;
  }
  .check:hover{ transform:translateY(-1px); border-color:#dd87a8; }
  .check:checked{
    background:linear-gradient(180deg, var(--accent), var(--accent-2)); border-color:var(--accent-2);
    box-shadow:0 8px 18px rgba(238,159,186,.3);
  }
  .check:checked::after{
    content:"✓"; position:absolute; inset:0; display:grid; place-items:center; color:white; font-size:18px; font-weight:800; animation: popTick .28s ease;
  }
  @keyframes popTick{
    0%{ transform:scale(.25) rotate(-14deg); opacity:0; }
    70%{ transform:scale(1.15) rotate(6deg); opacity:1; }
    100%{ transform:scale(1) rotate(0); opacity:1; }
  }
  .burst{ position:absolute; inset:-10px; pointer-events:none; }
  .spark{ position:absolute; left:50%; top:50%; width:8px; height:8px; margin:-4px 0 0 -4px; opacity:0; animation:none; }
  .spark::before{ content:"♥"; color:#ee9fba; font-size:10px; }
  .row.bursting .spark{ animation: burst .7s ease-out forwards; }
  .row.bursting .spark:nth-child(1){ animation-delay:0s; }
  .row.bursting .spark:nth-child(2){ animation-delay:.03s; }
  .row.bursting .spark:nth-child(3){ animation-delay:.06s; }
  .row.bursting .spark:nth-child(4){ animation-delay:.09s; }
  .row.bursting .spark:nth-child(5){ animation-delay:.12s; }
  .row.bursting .spark:nth-child(6){ animation-delay:.15s; }
  @keyframes burst{
    0%{ opacity:0; transform:translate(0,0) scale(.4); }
    20%{ opacity:1; }
    100%{ opacity:0; transform: translate(var(--tx), var(--ty)) scale(1.15); }
  }
  .text{
    flex:1; min-width:0; border:none; border-bottom:1px solid rgba(234,166,189,.38); background:transparent;
    color:var(--text); padding:6px 4px 7px; font-size:16px; outline:none; transition:border-color .15s ease, background-color .15s ease;
  }
  .text::placeholder{ color:#c292a4; }
  .text:focus{ border-bottom-color:var(--accent-2); background:rgba(255,255,255,.28); }
  .row.checked .text{
    color:#a1818d; text-decoration:line-through; text-decoration-thickness:1.5px; text-decoration-color:#d59ab0;
  }
  .footer-note{
    margin-top:16px; text-align:center; color:#b18493; font-size:12px;
  }
  @media (max-width:560px){
    .wrap{ margin:18px auto; padding:12px; }
    .card{ border-radius:22px; padding:20px 16px 16px; }
    .num{ width:30px; flex-basis:30px; font-size:14px; }
    .text{ font-size:15px; }
  }
</style>
</head>
<body>
  <div class="bg-hearts" id="bgHearts"></div>
  <div class="milestone-badge" id="milestoneBadge">냐옹! 10개 달성!</div>

  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>재영과 유나의 결투</h1>
        <p class="subtitle">고양이가 유나를 지배하고 유나는 고양이 전체를 지배한다</p>
        <div class="topbar">
          <div class="counter" id="counter">0 / 100 완료</div>
          <div class="actions">
            <button class="btn primary" id="copyBtn">결과 복사</button>
            <button class="btn" id="copyAllBtn">전체 복사</button>
          </div>
          <div class="copy-status" id="copyStatus"></div>
        </div>
      </div>

      <ul class="list" id="list"></ul>
      <div class="footer-note">체크 상태와 내용은 이 기기 브라우저에 저장돼.</div>
    </div>
  </div>

<script>
  const list = document.getElementById('list');
  const counter = document.getElementById('counter');
  const bgHearts = document.getElementById('bgHearts');
  const copyBtn = document.getElementById('copyBtn');
  const copyAllBtn = document.getElementById('copyAllBtn');
  const copyStatus = document.getElementById('copyStatus');
  const milestoneBadge = document.getElementById('milestoneBadge');

  const STORAGE_KEY = 'checklist100_yum_yuna_duel_v3';
  let previousDone = 0;
  let audioUnlocked = false;

  function makeBgHearts(){
    const count = 14;
    for(let i=0;i<count;i++){
      const heart = document.createElement('div');
      heart.className = 'float-heart';
      heart.textContent = Math.random() > 0.5 ? '♥' : '✦';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (12 + Math.random() * 16) + 's';
      heart.style.animationDelay = (-Math.random() * 20) + 's';
      heart.style.fontSize = (12 + Math.random() * 14) + 'px';
      bgHearts.appendChild(heart);
    }
  }

  function loadData(){
    try{
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }catch(e){
      return [];
    }
  }

  function getRows(){
    return [...document.querySelectorAll('.row')];
  }

  function getDoneCount(){
    return getRows().filter(row => row.querySelector('.check').checked).length;
  }

  function save(){
    const data = [];
    getRows().forEach(row => {
      const checkbox = row.querySelector('.check');
      const text = row.querySelector('.text');
      data.push({ checked: checkbox.checked, value: text.value });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    updateCounter(true);
  }

  function updateCounter(checkMilestone = false){
    const rows = getRows();
    let done = 0;
    rows.forEach(row => {
      const checked = row.querySelector('.check').checked;
      row.classList.toggle('checked', checked);
      if(checked) done++;
    });
    counter.textContent = `${done} / 100 완료`;

    if(checkMilestone && done > previousDone && done % 10 === 0){
      celebrateMilestone(done);
    }
    previousDone = done;
  }

  function triggerBurst(row){
    row.classList.remove('bursting');
    void row.offsetWidth;
    row.classList.add('bursting');
    setTimeout(() => row.classList.remove('bursting'), 800);
  }

  function createBurstContainer(){
    const burst = document.createElement('div');
    burst.className = 'burst';
    const positions = [
      ['0px','-24px'], ['20px','-12px'], ['20px','12px'],
      ['0px','24px'], ['-20px','12px'], ['-20px','-12px']
    ];
    positions.forEach(([x,y]) => {
      const spark = document.createElement('span');
      spark.className = 'spark';
      spark.style.setProperty('--tx', x);
      spark.style.setProperty('--ty', y);
      burst.appendChild(spark);
    });
    return burst;
  }

  function showCopyStatus(message){
    copyStatus.textContent = message;
    clearTimeout(showCopyStatus._t);
    showCopyStatus._t = setTimeout(() => {
      copyStatus.textContent = '';
    }, 2200);
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try{
        document.execCommand('copy');
        document.body.removeChild(ta);
        return true;
      }catch(err){
        document.body.removeChild(ta);
        return false;
      }
    }
  }

  function buildCheckedSummary(){
    const lines = [];
    getRows().forEach(row => {
      const checked = row.querySelector('.check').checked;
      if(!checked) return;
      const num = row.querySelector('.num').textContent;
      const value = row.querySelector('.text').value.trim();
      lines.push(`✔ ${num}. ${value || '(내용 없음)'}`);
    });
    if(lines.length === 0){
      return '아직 체크한 항목이 없어!';
    }
    return `재영과 유나의 결투\n완료 ${lines.length} / 100\n\n` + lines.join('\n');
  }

  function buildFullSummary(){
    const lines = [];
    getRows().forEach(row => {
      const checked = row.querySelector('.check').checked;
      const mark = checked ? '✔' : '□';
      const num = row.querySelector('.num').textContent;
      const value = row.querySelector('.text').value.trim();
      lines.push(`${mark} ${num}. ${value}`);
    });
    return `재영과 유나의 결투\n완료 ${getDoneCount()} / 100\n\n` + lines.join('\n');
  }

  function unlockAudio(){
    audioUnlocked = true;
    window.removeEventListener('pointerdown', unlockAudio);
    window.removeEventListener('keydown', unlockAudio);
  }

  function playMeow(){
    if(!audioUnlocked) return;
    try{
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if(!AudioContext) return;
      const ctx = new AudioContext();

      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
      master.connect(ctx.destination);

      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1300;

      osc1.type = 'sawtooth';
      osc2.type = 'triangle';

      osc1.frequency.setValueAtTime(720, now);
      osc1.frequency.exponentialRampToValueAtTime(520, now + 0.12);
      osc1.frequency.exponentialRampToValueAtTime(410, now + 0.28);

      osc2.frequency.setValueAtTime(900, now);
      osc2.frequency.exponentialRampToValueAtTime(620, now + 0.10);
      osc2.frequency.exponentialRampToValueAtTime(500, now + 0.26);

      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(master);

      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.42);
      osc2.stop(now + 0.42);

      setTimeout(() => ctx.close().catch(() => {}), 700);
    }catch(e){}
  }

  function celebrateMilestone(done){
    milestoneBadge.textContent = `냐옹! ${done}개 달성!`;
    milestoneBadge.classList.remove('show');
    void milestoneBadge.offsetWidth;
    milestoneBadge.classList.add('show');
    playMeow();
  }

  function build(){
    const saved = loadData();

    for(let i=1;i<=100;i++){
      const li = document.createElement('li');
      li.className = 'row';

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = i;

      const wrap = document.createElement('div');
      wrap.className = 'check-wrap';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'check';

      const text = document.createElement('input');
      text.type = 'text';
      text.className = 'text';
      text.placeholder = '여기에 적기';

      if(saved[i-1]){
        checkbox.checked = !!saved[i-1].checked;
        text.value = saved[i-1].value || '';
      }

      checkbox.addEventListener('change', () => {
        save();
        if(checkbox.checked) triggerBurst(li);
      });

      text.addEventListener('input', save);

      wrap.appendChild(checkbox);
      li.appendChild(num);
      li.appendChild(wrap);
      li.appendChild(text);
      li.appendChild(createBurstContainer());
      list.appendChild(li);

      if(i % 10 === 0 && i !== 100){
        const divider = document.createElement('hr');
        divider.className = 'divider';
        list.appendChild(divider);
      }
    }

    previousDone = getDoneCount();
    updateCounter(false);
  }

  copyBtn.addEventListener('click', async () => {
    const ok = await copyText(buildCheckedSummary());
    showCopyStatus(ok ? '완료한 항목만 복사했어.' : '복사에 실패했어.');
  });

  copyAllBtn.addEventListener('click', async () => {
    const ok = await copyText(buildFullSummary());
    showCopyStatus(ok ? '전체 목록을 복사했어.' : '복사에 실패했어.');
  });

  window.addEventListener('pointerdown', unlockAudio, { once: true });
  window.addEventListener('keydown', unlockAudio, { once: true });

  makeBgHearts();
  build();
</script>
</body>
</html>
